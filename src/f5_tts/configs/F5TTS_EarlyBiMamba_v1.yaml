# ============================================================
#  F5TTS_EarlyBiMamba_v1  —  RECOMMENDED CONFIGURATION
# ============================================================
#
#  Architecture philosophy:
#    Layer  0– 7 → BidirectionalMambaSubBlock   (local acoustic encode)
#    Layer  8–21 → DiTBlock full attention+RoPE  (global context)
#
#  Why this works:
#    - Early layers process raw acoustic features (formants, pitch extraction,
#      onset/offset, phoneme identity). These are LOCAL operations that benefit
#      from Mamba's O(L) efficiency without needing look-ahead.
#    - Bidirectional scan (fwd + bwd) gives full-sequence receptive field —
#      no causal bias that would break coarticulation modeling.
#    - Late DiT layers build word-level prosody, speaker identity, and
#      sentence-level coherence — these REQUIRE full attention + RoPE.
#    - Result: ~36% of layers (8/22) are Mamba → significant RTF reduction
#      while global context is fully preserved by DiT layers 8–21.
#
#  Init strategy:
#    Load from pretrained F5-TTS checkpoint.  FFN + AdaLN weights for
#    layers 0–7 are copied; only the SSM mixer weights are fresh.
#    Use knowledge distillation (use_distill: true) for first 5k steps
#    to stabilise the new Mamba layers.
# ============================================================

hydra:
  run:
    dir: ckpts/${model.name}_${model.mel_spec.mel_spec_type}_${model.tokenizer}_${datasets.name}/${now:%Y-%m-%d}/${now:%H-%M-%S}

datasets:
  name: Emilia_ZH_EN
  batch_size_per_gpu: 38400
  batch_size_type: frame
  max_samples: 64
  num_workers: 16

optim:
  epochs: 11
  learning_rate: 7.5e-5
  num_warmup_updates: 20000
  grad_accumulation_steps: 1
  max_grad_norm: 1.0
  bnb_optimizer: False

model:
  name: F5TTS_EarlyBiMamba_v1
  tokenizer: pinyin
  tokenizer_path: null
  backbone: HybridDiT
  arch:
    # --- DiT base (unchanged from F5TTS_Base) ---
    dim: 1024
    depth: 22
    heads: 16
    ff_mult: 2
    text_dim: 512
    text_mask_padding: False
    conv_layers: 4
    pe_attn_head: 1
    attn_backend: torch
    attn_mask_enabled: False
    checkpoint_activations: False

    # --- Mamba: early layers 0–7 ---
    use_mamba: true
    mamba_layers: [0, 1, 2, 3, 4, 5, 6, 7]  # 8 of 22 layers = 36%

    # Bidirectional (REQUIRED for non-autoregressive TTS)
    use_bidi: true
    inject_sinpos: true           # sinusoidal pos bias before each SSM scan

    # SSM hyperparameters
    mamba_d_state: 64             # 4× legacy (16→64): richer temporal memory
    mamba_d_conv: 4               # local window: 4 frames ≈ 42 ms
    mamba_expand: 2               # inner_dim = 2 × 1024 = 2048

    # Distillation capture (used if use_distill: true below)
    capture_hidden_for_distill: false

  cfm_experiment:
    # Warmup distillation — turn on for first fine-tuning run from DiT ckpt.
    # Set use_distill: true + lambda_distill_out: 0.1 for first 5k steps,
    # then switch to false for full training.
    use_distill: false
    lambda_distill_out: 0.0
    lambda_distill_hidden: 0.0
    distill_hidden_layers: []
    use_ctc: false
    lambda_ctc: 0.0
    ctc_on_generated_only: true
    ctc_layer_index: -2
    use_accent_adv: false
    lambda_adv: 0.0
    adv_num_classes: 0
    adv_pooling: masked_mean
    adv_feature_layer: -1

  mel_spec:
    target_sample_rate: 24000
    n_mel_channels: 100
    hop_length: 256
    win_length: 1024
    n_fft: 1024
    mel_spec_type: vocos

  vocoder:
    is_local: False
    local_path: null

ckpts:
  logger: wandb
  wandb_project: CFM-TTS
  wandb_run_name: ${model.name}_${model.mel_spec.mel_spec_type}_${model.tokenizer}_${datasets.name}
  wandb_resume_id: null
  log_samples: True
  save_per_updates: 50000
  keep_last_n_checkpoints: -1
  last_per_updates: 5000
  save_dir: ckpts/${model.name}_${model.mel_spec.mel_spec_type}_${model.tokenizer}_${datasets.name}
